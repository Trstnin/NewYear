<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For My Love ❤️</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #ff9a9e, #fecfef);
      font-family: 'Comic Sans MS', cursive;
      text-align: center;
      padding: 20px;
    }

    .container {
      background: rgba(255,255,255,0.2);
      padding: clamp(20px, 5vw, 40px);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: min(90%, 400px);
    }

    h1 {
      color: white;
      font-size: clamp(1.8rem, 5vw, 2.5rem);
      margin-bottom: 10px;
    }

    p {
      color: white;
      font-size: clamp(1rem, 3vw, 1.2rem);
    }

    button {
      margin-top: 20px;
      padding: 15px 30px;
      font-size: clamp(1rem, 3vw, 1.2rem);
      border: none;
      border-radius: 30px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      transform: scale(1.08);
      background: #ff1e4d;
    }

    /* 💖 mobile tweak */
    @media (max-width: 480px) {
      .container {
        padding: 25px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Hey My Love 💖</h1>
    <p>I made something special for you 🌸</p>
    <button onclick="openWish()">Click Me 💌</button>
  </div>

  <script>
    function openWish() {
      window.location.href = "wish.html";
    }
  </script>
</body>
</html>
